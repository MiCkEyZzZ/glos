# Дубликаты зависимостей
[bans]
multiple-versions    = "warn"
wildcards            = "deny"
allow-wildcard-paths = true

deny = [
    # Уязвимые версии OpenSSL (если вдруг добавится через транзитивную зависимость)
    { name = "openssl", version = "<0.10.60" },
]

skip = []
skip-tree = []

[advisories]
yanked      = "deny"
unmaintained = "warn"
unsound     = "deny"
ignore      = [
    # Транзитивная зависимость через image/rav1e, прямого влияния нет
    { id = "RUSTSEC-2024-0436", reason = "transitive via image crate, no direct impact on GLOS" },
]

# Лицензии
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSL-1.0",
    "OFL-1.1",
    "NCSA",
    "CC0-1.0",
]

private = { ignore = true }

# Источники
[sources]
unknown-git      = "deny"
unknown-registry = "deny"
required-git-spec = "rev"

allow-git = []

[sources.allow-org]
github = []
