name: Hardware Features (optional)

# Проверяет что весь код с hardware feature flags компилируется.
# Тесты НЕ запускаются — реального железа в CI нет.
# Запускается вручную или при изменениях в glos-hal / glos-recorder.
on:
  workflow_dispatch:
  push:
    paths:
      - "glos-hal/**"
      - "glos-recorder/**"
      - ".github/workflows/hardware-optional.yml"

concurrency:
  group: hardware-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check-hackrf:
    name: Check — HackRF One
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/install-sdr-deps
      - run: cargo check -p glos-hal --features hackrf
      - run: cargo check -p glos-recorder --features hackrf

  check-pluto:
    name: Check — PlutoSDR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/install-sdr-deps
      - run: cargo check -p glos-hal --features pluto

  check-usrp:
    name: Check — USRP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/install-sdr-deps
      - run: cargo check -p glos-hal --features usrp

  check-lime:
    name: Check — LimeSDR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/install-sdr-deps
      - run: cargo check -p glos-hal --features lime

  check-all-features:
    name: Check — all hardware features combined
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/install-sdr-deps
      - name: cargo check workspace all features
        run: cargo check --workspace --all-features
      - name: Clippy with all features
        run: cargo clippy --workspace --all-features -- -D warnings
