name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # нужно для создания GitHub Release

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Сборка релизных бинарников
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: glos
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: glos
            cross: true

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      # SDR зависимости нужны только для нативной сборки (не cross)
      - uses: ./.github/actions/install-sdr-deps
        if: ${{ !matrix.cross }}

      # cross — кросс-компиляция без настройки sysroot вручную
      - name: Install cross (if needed)
        if: ${{ matrix.cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary (native)
        if: ${{ !matrix.cross }}
        run: cargo build -p glos-cli --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: ${{ matrix.cross }}
        run: cross build -p glos-cli --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          BINARY_PATH="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          ARTIFACT_NAME="glos-${{ github.ref_name }}-${{ matrix.target }}"
          cp "$BINARY_PATH" "$ARTIFACT_NAME"
          sha256sum "$ARTIFACT_NAME" > "$ARTIFACT_NAME.sha256"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.ARTIFACT_NAME }}
            ${{ env.ARTIFACT_NAME }}.sha256
          retention-days: 7

  # GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GLOS ${{ github.ref_name }}"
          draft: true # сначала draft — проверь перед публикацией
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/**/*
          body: |
            ## GLOS ${{ github.ref_name }}

            ### Изменения
            <!-- Заполни из CHANGELOG.md -->

            ### Установка
            ```bash
            # Linux x86_64
            curl -LO https://github.com/MiCkEyZzZ/glos/releases/download/${{ github.ref_name }}/glos-${{ github.ref_name }}-x86_64-unknown-linux-gnu
            chmod +x glos-*
            ```

            ### Проверка целостности
            ```bash
            sha256sum --check glos-*.sha256
            ```

            > ⚠️ Pre-0.1 релиз. API и формат файлов могут меняться.
