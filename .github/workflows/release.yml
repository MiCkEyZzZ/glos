name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # macOS/Windows опционально — SDR инструменты редко там нужны
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/install-sdr-deps
        if: runner.os == 'Linux'
      - name: Build release binary
        run: |
          cargo build -p glos-cli --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glos-${{ matrix.target }}
          path: target/release/glos
