name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  RUST_BACKTRACE: 1

jobs:
  # Форматирование
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Clippy
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Run Clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Зависимости: лицензии / уязвимости / дубли
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Check licenses, advisories, bans
        run: cargo deny check

  # Тесты: чистая логика (без hardware)
  test-core:
    name: Tests — core crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Test glos-types
        run: cargo nextest run -p glos-types --no-tests=pass

      - name: Test glos-core (unit + integration)
        run: cargo nextest run -p glos-core --no-tests=pass

      - name: Integration tests glos-core
        run: cargo test -p glos-core --test integration_tests

      - name: Test glos-analyzer
        run: cargo nextest run -p glos-analyzer --no-tests=pass

      - name: Test glos-replayer
        run: cargo nextest run -p glos-replayer --no-tests=pass

  # Тесты: recorder в sim-режиме (без железа)
  test-recorder-sim:
    name: Tests — recorder (sim mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Test recorder (simulator device, no hardware needed)
        run: cargo nextest run -p glos-recorder --no-tests=pass
        env:
          GLOS_DEVICE: sim

  # Компиляция с hardware features (без запуска тестов)
  check-hardware-features:
    name: Check — hardware features compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/install-sdr-deps

      - name: cargo check — glos-recorder + hackrf feature
        run: cargo check -p glos-recorder --features hackrf

      - name: cargo check — glos-hal all features
        run: cargo check -p glos-hal --all-features

      - name: cargo check — full workspace all features
        run: cargo check --workspace --all-features

  # Бенчмарки: только компиляция, не запуск
  benches-compile:
    name: Benches — compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Check that benches compile
        run: cargo bench --workspace --no-run
