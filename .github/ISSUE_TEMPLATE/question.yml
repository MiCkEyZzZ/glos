name: Question
description: Ask the GLOS developers or community
title: "[QUESTION] <short summary>"
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        👋 **Welcome!**

        This issue tracker is primarily for bugs and feature proposals.
        For general usage questions, please check community resources first:

        - [GLOS Community Chat (Pachca)](https://app.pachca.com/join?invite_token=EakW3nIgma_ezqFc&company_name=Glos+Community&company_id=416542)
        - [GLOS Discussions](https://github.com/MiCkEyZzZ/glos/discussions)
        - [Documentation](https://github.com/MiCkEyZzZ/glos/tree/master/docs)

        Please search existing issues and discussions before submitting.

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Recording (glos-recorder, SDR setup)
        - Replay (glos-replayer, UDP output)
        - Analysis (glos-analyzer, FFT, waterfall)
        - .glos file format
        - Hardware (HackRF, PlutoSDR, USRP, LimeSDR)
        - Build / compilation
        - Architecture / design
        - Integration with other tools
        - Other
    validations:
      required: true

  - type: textarea
    id: your_question
    attributes:
      label: Your question
      description: Describe your question clearly. Include relevant commands, configs, or code snippets.
      placeholder: |
        Example:
        How do I record at 4 MHz sample rate with HackRF and then replay it over UDP
        without dropping IQ blocks? What buffer size should I use?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What have you already tried?
      description: Docs read, commands attempted, errors encountered — helps avoid duplicate answers.
