name: Enhancement
description: Suggest an improvement to existing GLOS functionality
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose an improvement to something that **already exists** in GLOS.
        For completely new functionality, use the **New Feature** template instead.

  - type: dropdown
    id: component
    attributes:
      label: Which component does this affect?
      multiple: true
      options:
        - glos-core (file format / IQ handling)
        - glos-recorder
        - glos-replayer
        - glos-analyzer (FFT / waterfall / DSP)
        - glos-hal (hardware abstraction)
        - glos-cli
        - glos-ui
        - glos-types
        - .glos file format
        - CI / tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type of enhancement
      multiple: true
      options:
        - Performance (throughput, latency, memory)
        - API / interface improvement
        - DSP / signal quality
        - Hardware support
        - File format / serialization
        - Configuration / ergonomics
        - Refactor / tech debt
        - Documentation
        - Other

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: Describe what GLOS currently does and why it is insufficient.
    validations:
      required: true

  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed improvement
      description: Describe what the improved behavior should look like.
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation ideas or challenges
      description: Any thoughts on how to implement this, or potential difficulties.
