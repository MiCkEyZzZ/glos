name: Crash report
description: Submit a crash / panic report for GLOS
title: "[CRASH] <short description>"
labels: ["crash"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Before submitting**
        - Check that you are on the latest commit of the `master` branch.
        - If the crash is reproducible with `--device sim`, please confirm that in the report.
        - For hardware-specific crashes (HackRF, PlutoSDR, etc.) include driver versions.

        Please provide as much detail as possible to help us diagnose the crash.

  - type: dropdown
    id: component
    attributes:
      label: Which component crashed?
      options:
        - glos-recorder
        - glos-replayer
        - glos-analyzer
        - glos-hal
        - glos-cli
        - glos-ui
        - Unknown
    validations:
      required: true

  - type: textarea
    id: crash_log
    attributes:
      label: Crash log / panic output
      description: |
        Paste the complete output including the panic message and backtrace.
        Set `RUST_BACKTRACE=1` before running to get a full backtrace.
      placeholder: |
        thread 'main' panicked at 'called `Result::unwrap()` on an `Err` value: ...', glos-recorder/src/pipeline.rs:42
        stack backtrace:
           0: rust_begin_unwind
           ...
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: The exact command that triggered the crash.
      placeholder: |
        RUST_BACKTRACE=1 cargo run -p glos-recorder --release -- \
          --device hackrf --freq 1602MHz --rate 2MHz --gain 40 \
          --output signal.glos --duration 60
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: Ubuntu 24.04
        Rust: nightly-2026-02-14
        GLOS commit: abc1234
        SDR device: HackRF One (firmware 2023.01)
        libhackrf: 2023.01.1
    validations:
      required: true
