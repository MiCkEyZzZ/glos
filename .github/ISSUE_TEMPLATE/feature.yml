name: New Feature
description: Suggest a completely new feature for GLOS
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a **new** feature for GLOS.
        If you want to improve something that already exists, use the **Enhancement** template.

        GLOS is focused on: recording RF/IQ GNSS signals, deterministic replay, signal analysis,
        and reproducible laboratory experiments. Please keep proposals aligned with this scope.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      multiple: true
      options:
        - Signal recording
        - Signal replay
        - DSP / analysis (FFT, waterfall, SNR, Doppler)
        - Hardware support (new SDR device)
        - GNSS constellation (GPS, Galileo, BeiDou)
        - .glos file format
        - CLI / UX
        - GUI / visualization
        - Integration (GLINT, USMET, external tools)
        - CI / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this feature solve?
      description: |
        Describe the use case and why it is important.
        What workflow is currently impossible or painful without this feature?
    validations:
      required: true

  - type: textarea
    id: feature
    attributes:
      label: Proposed feature description
      description: |
        High-level overview of what the feature should do and how it fits into GLOS architecture.
        If it affects the .glos file format, describe the format changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Did you consider workarounds or alternative approaches? Why are they insufficient?

  - type: textarea
    id: implementation
    attributes:
      label: Implementation ideas or challenges
      description: Any thoughts on design, affected crates, or potential difficulties.
